{% extends "base.html" %}

{% block title %}Byt lösenord – Kramnet{% endblock %}

{% block content %}
<div style="max-width: 520px;">
  <div style="margin-bottom: 1.25rem;">
    <a href="/portal/dashboard" style="font-size:.9rem;">&larr; Tillbaka till mina konton</a>
  </div>

  <div class="card">
    <h1 style="font-size: 1.3rem; margin-bottom: .4rem;">Byt lösenord</h1>
    <p style="color:#666; margin-bottom:1.5rem; font-size:.9rem;">
      Konto: <strong>{{ account.address }}</strong>
    </p>

    <form
      id="pw-form"
      hx-post="/portal/account/{{ account.id }}/change-password"
      hx-target="#pw-form"
      hx-swap="outerHTML"
      onsubmit="return checkPasswords()"
    >
      <div style="margin-bottom: 1rem;">
        <label for="new_password" style="display:block; font-weight:600; margin-bottom:.4rem;">
          Nytt lösenord
        </label>
        <input
          type="password"
          id="new_password"
          name="new_password"
          minlength="8"
          required
          autocomplete="new-password"
        >
      </div>

      <div style="margin-bottom: .5rem;">
        <label for="confirm_password" style="display:block; font-weight:600; margin-bottom:.4rem;">
          Bekräfta lösenord
        </label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          minlength="8"
          required
          autocomplete="new-password"
        >
      </div>

      <p id="pw-mismatch" style="color:#c0392b; font-size:.875rem; margin-bottom:.75rem; display:none;">
        Lösenorden matchar inte.
      </p>

      <button type="submit" class="btn" style="margin-top:.75rem;">Byt lösenord</button>
    </form>
  </div>
</div>

{% block scripts %}
<script>
  function checkPasswords() {
    const a = document.getElementById("new_password").value;
    const b = document.getElementById("confirm_password").value;
    const msg = document.getElementById("pw-mismatch");
    if (a !== b) {
      msg.style.display = "block";
      return false;
    }
    msg.style.display = "none";
    return true;
  }
  document.getElementById("confirm_password").addEventListener("input", checkPasswords);
</script>
{% endblock %}
{% endblock %}
