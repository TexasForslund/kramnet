{% extends "base.html" %}

{% block title %}Slutför din betalning – Kramnet{% endblock %}

{% block content %}
<div style="max-width: 680px; margin: 2rem auto;">
  <h1 style="font-size:1.5rem; margin-bottom:1.5rem;">Slutför din betalning</h1>

  <div class="card" style="margin-bottom:1.5rem; background:#f8f9ff; font-size:.9rem;">
    <div style="display:flex;justify-content:space-between;margin-bottom:.4rem;">
      <span style="color:#888;">E-postadress</span>
      <strong>{{ account.address }}</strong>
    </div>
    <div style="display:flex;justify-content:space-between;">
      <span style="color:#888;">Belopp</span>
      <strong>{{ amount_kr }} kr</strong>
    </div>
  </div>

  {{ html_snippet|safe }}
</div>
{% endblock %}
