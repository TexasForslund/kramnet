<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kramnet{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      letter-spacing: -0.5px;
      background: #E8F0F3;
      color: #1a1a2e;
    }

    h1, h2, h3 {
      font-family: 'Familjen Grotesk', sans-serif;
      letter-spacing: -1px;
    }

    a { color: #00648F; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Navbar ─────────────────────────────── */
    nav {
      background: #fff;
      border-bottom: 1px solid #E8F0F3;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .logo {
      font-family: 'Familjen Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #00648F;
      letter-spacing: -1px;
    }
    nav .nav-actions { display: flex; gap: 1rem; align-items: center; }

    /* ── Main layout ────────────────────────── */
    main { max-width: 860px; margin: 2.5rem auto; padding: 0 1rem; }

    /* ── Card ───────────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid #d1dde3;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 1.75rem;
      margin-bottom: 1rem;
    }

    /* ── Buttons ────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      background: #00648F;
      color: #fff;
      cursor: pointer;
      font-family: 'Open Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      transition: background 0.15s;
    }
    .btn:hover { background: #004f72; text-decoration: none; color: #fff; }

    .btn-secondary {
      background: #fff;
      color: #00648F;
      border: 1.5px solid #d1dde3;
    }
    .btn-secondary:hover { background: #E8F0F3; }

    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #a93226; }

    /* ── Inputs ─────────────────────────────── */
    input[type="email"],
    input[type="text"],
    input[type="tel"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d1dde3;
      border-radius: 10px;
      font-family: 'Open Sans', sans-serif;
      font-size: 1rem;
      letter-spacing: -0.5px;
      color: #1a1a2e;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 0;
    }
    input:focus {
      outline: none;
      border-color: #00648F;
      box-shadow: 0 0 0 3px rgba(0,100,143,0.15);
    }

    label {
      font-family: 'Open Sans', sans-serif;
      letter-spacing: -0.5px;
    }

    /* ── Badges ─────────────────────────────── */
    .badge {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
    }
    .badge-active   { background: #d4edda; color: #155724; }
    .badge-inactive { background: #f8d7da; color: #721c24; }
    .badge-pending  { background: #fff3cd; color: #856404; }

    /* ── Notices ────────────────────────────── */
    .notice { padding: .75rem 1rem; background: #e6f2f8; border-left: 4px solid #00648F; border-radius: 4px; }
    .error  { padding: .75rem 1rem; background: #fdf0f0; border-left: 4px solid #c0392b; border-radius: 4px; color: #c0392b; }

    /* ── Account rows (portal) ──────────────── */
    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 0;
      border-bottom: 1px solid #eee;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .account-row:last-child { border-bottom: none; }
    .account-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* ── Btn-sm (admin) ─────────────────────── */
    .btn-sm {
      display: inline-block;
      padding: .35rem .75rem;
      border-radius: 8px;
      border: none;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-ok   { background: #d4edda; color: #155724; }
    .btn-warn { background: #f8d7da; color: #721c24; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="logo" href="/">Kramnet</a>
    <div class="nav-actions">
      {% if request.cookies.get("session") %}
        <a href="/portal/dashboard" style="font-weight:600; color:#1a1a2e;">Mina konton</a>
        <form method="post" action="/auth/logout" style="margin:0">
          <button type="submit" class="btn btn-secondary" style="padding: 10px 20px;">Logga ut</button>
        </form>
      {% else %}
        <a class="btn" href="/auth/login" style="padding: 10px 20px;">Logga in</a>
      {% endif %}
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
