<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kramnet{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    a { color: #0057b8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .logo { font-size: 1.25rem; font-weight: 700; color: #0057b8; }
    nav .nav-actions { display: flex; gap: 1rem; align-items: center; }

    main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: .5rem 1rem;
      border-radius: 5px;
      border: 1px solid #0057b8;
      background: #0057b8;
      color: #fff;
      cursor: pointer;
      font-size: .95rem;
    }
    .btn:hover { background: #004099; text-decoration: none; }
    .btn-secondary {
      background: #fff;
      color: #0057b8;
    }
    .btn-secondary:hover { background: #eef4ff; }
    .btn-danger { background: #c0392b; border-color: #c0392b; }
    .btn-danger:hover { background: #a93226; }

    .badge {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
    }
    .badge-active   { background: #d4edda; color: #155724; }
    .badge-inactive { background: #f8d7da; color: #721c24; }
    .badge-pending  { background: #fff3cd; color: #856404; }

    .notice { padding: .75rem 1rem; background: #eef4ff; border-left: 4px solid #0057b8; border-radius: 4px; }
    .error  { padding: .75rem 1rem; background: #fdf0f0; border-left: 4px solid #c0392b; border-radius: 4px; color: #c0392b; }

    input[type="email"], input[type="text"] {
      width: 100%;
      padding: .6rem .75rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      margin-bottom: .75rem;
    }
    input:focus { outline: 2px solid #0057b8; border-color: transparent; }

    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 0;
      border-bottom: 1px solid #eee;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .account-row:last-child { border-bottom: none; }
    .account-actions { display: flex; gap: .5rem; flex-wrap: wrap; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="logo" href="/">Kramnet</a>
    <div class="nav-actions">
      {% if request.cookies.get("session") %}
        <a href="/portal/dashboard">Mina konton</a>
        <form method="post" action="/auth/logout" style="margin:0">
          <button type="submit" class="btn btn-secondary" style="border:none;cursor:pointer;">Logga ut</button>
        </form>
      {% else %}
        <a class="btn" href="/auth/login">Logga in</a>
      {% endif %}
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
