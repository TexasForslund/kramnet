<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Logga in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; border-radius: 10px; padding: 2.5rem; width: 340px; }
    h1 { font-size: 1.25rem; margin-bottom: .25rem; }
    .subtitle { color: #888; font-size: .875rem; margin-bottom: 1.75rem; }
    label { display: block; font-weight: 600; font-size: .875rem; margin-bottom: .4rem; }
    input[type="password"] { width: 100%; padding: .55rem .75rem; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; margin-bottom: 1rem; }
    input:focus { outline: 2px solid #0057b8; border-color: transparent; }
    button { width: 100%; padding: .6rem; background: #1a1a2e; color: #fff; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2e2e50; }
    .error { padding: .6rem .9rem; background: #fdf0f0; border-left: 3px solid #c0392b; border-radius: 4px; color: #c0392b; font-size: .875rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Kramnet Admin</h1>
    <p class="subtitle">Logga in för att fortsätta</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <label for="password">Lösenord</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Logga in</button>
    </form>
  </div>
</body>
</html>
